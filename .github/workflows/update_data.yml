name: Actualizar Resultados Melate

on:
  schedule:
    - cron: '0 10 * * 1,3' # Se ejecuta a las 10 AM UTC (4 AM hora Puebla) los Lunes y Miércoles
  workflow_dispatch: # Permite ejecutarlo manualmente también

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install requests

      - name: Ejecutar Scraper
        run: python update_results.py

      - name: Guardar cambios
        run: |
          git config --global user.name 'MelateX Bot'
          git config --global user.email 'bot@melatex.com'
          git add melate_retro_results.json
          git commit -m "Auto-update: Sorteos reales" || exit 0
          git push
