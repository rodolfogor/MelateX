name: Actualizar Resultados Melate

on:
  workflow_dispatch: # Solo se ejecuta cuando se dispara manualmente (botón "Sincronizar Datos" o desde GitHub)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install requests beautifulsoup4

      - name: Ejecutar Scraper
        run: python update_results.py

      - name: Guardar cambios
        run: |
          git config --global user.name 'MelateX Bot'
          git config --global user.email 'bot@melatex.com'
          git add melate_retro_results.json
          git commit -m "Auto-update: Sorteos reales" || exit 0
          git push
